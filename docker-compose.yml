version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: llm_manager_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-llm_manager}
      MYSQL_USER: ${DB_USER:-llm_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - llm_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: llm_manager_app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER:-llm_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-llm_manager}
    volumes:
      - .:/app
    networks:
      - llm_network
    stdin_open: true
    tty: true
    command: python llm_manager.py

volumes:
  mysql_data:

networks:
  llm_network:
    driver: bridge
